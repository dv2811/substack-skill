name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build for all platforms
        id: build
        run: |
          # Tools to build
          TOOLS=("substack" "koyfin")
          BINARY_NAMES=("substack" "koyfin")

          # Platform configurations
          PLATFORMS=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "linux arm"
            "windows amd64"
            "windows 386"
          )

          # Build all tools for all platforms
          for platform in "${PLATFORMS[@]}"; do
            read -r os arch <<< "$platform"
            PLATFORM_DIR="build/${os}-${arch}"

            for i in "${!TOOLS[@]}"; do
              TOOL_NAME="${TOOLS[$i]}"
              BINARY_NAME="${BINARY_NAMES[$i]}"
              SRC_DIR="tools/${TOOL_NAME}/src"
              TOOL_DIR="${PLATFORM_DIR}/${TOOL_NAME}"

              # Create tool directory structure
              mkdir -p "${TOOL_DIR}/scripts"

              # Set binary name
              if [ "$os" = "windows" ]; then
                BIN_FILE="${TOOL_DIR}/scripts/${BINARY_NAME}.exe"
              else
                BIN_FILE="${TOOL_DIR}/scripts/${BINARY_NAME}"
              fi

              # Build binary
              echo "Building ${TOOL_NAME} for ${os}/${arch}..."
              BIN_PATH="$(pwd)/${BIN_FILE}"
              (cd "$SRC_DIR" && GOOS="$os" GOARCH="$arch" go build -ldflags='-w -s' -o "$BIN_PATH" ".")

              # Copy SKILL.md
              cp "tools/${TOOL_NAME}/SKILL.md" "${TOOL_DIR}/"

              # Copy utils if exists
              if [ -d "tools/${TOOL_NAME}/utils" ]; then
                mkdir -p "${TOOL_DIR}/utils"
                cp -r "tools/${TOOL_NAME}/utils/"* "${TOOL_DIR}/utils/"
              fi
            done
          done

          # Create archive for each platform
          ARTIFACT_DIR="$(pwd)/artifacts"
          mkdir -p "$ARTIFACT_DIR"
          for platform in "${PLATFORMS[@]}"; do
            read -r os arch <<< "$platform"
            PLATFORM_DIR="build/${os}-${arch}"
            ARCHIVE_NAME="${os}-${arch}"

            if [ "$os" = "windows" ]; then
              (cd "$PLATFORM_DIR" && zip -r "$ARTIFACT_DIR/${ARCHIVE_NAME}.zip" .)
            else
              (cd "$PLATFORM_DIR" && tar -czf "$ARTIFACT_DIR/${ARCHIVE_NAME}.tar.gz" .)
            fi
          done

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
